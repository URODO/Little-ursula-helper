<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Little Ursula — Guest Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #0F6E56;
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --text: #1a1a18;
    --text-muted: #7a7a72;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }

  .container { width: 100%; max-width: 480px; display: flex; flex-direction: column; height: min(700px, calc(100vh - 32px)); background: var(--surface); border-radius: 24px; border: 0.5px solid var(--border); box-shadow: 0 8px 40px rgba(0,0,0,0.08); overflow: hidden; }

  .header { padding: 18px 20px 16px; border-bottom: 0.5px solid var(--border); }
  .header-top { display: flex; align-items: center; gap: 12px; }
  .header-icon { width: 42px; height: 42px; border-radius: 12px; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .header-title { font-family: 'DM Serif Display', serif; font-size: 20px; }
  .header-sub { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  .online-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; }

  .messages { flex: 1; overflow-y: auto; padding: 18px 16px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg { display: flex; gap: 8px; animation: fadeUp 0.2s ease; }
  .msg.user { flex-direction: row-reverse; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .msg-av { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .msg.bot .msg-av { background: var(--green-light); }
  .msg.user .msg-av { background: #f0f0ec; }

  .bubble { padding: 10px 14px; font-size: 14px; line-height: 1.6; max-width: calc(100% - 46px); }
  .msg.bot .bubble { background: #F5F5F1; border-radius: 4px 16px 16px 16px; }
  .msg.user .bubble { background: var(--green); border-radius: 16px 4px 16px 16px; color: #fff; }

  .typing-dots { display: flex; gap: 4px; padding: 4px 0; align-items: center; }
  .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); animation: dot 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }

  .quick { padding: 10px 14px 6px; display: flex; flex-wrap: wrap; gap: 6px; border-top: 0.5px solid var(--border); }
  .qbtn { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 11px; border-radius: 20px; border: 0.5px solid var(--border); background: var(--bg); color: var(--text-muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .qbtn:hover { background: var(--green-light); border-color: var(--green); color: var(--green-dark); }

  .input-area { display: flex; gap: 8px; padding: 10px 14px 14px; }
  .input-area input { flex: 1; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 14px; border-radius: 24px; border: 0.5px solid var(--border); background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
  .input-area input::placeholder { color: var(--text-muted); }
  .input-area input:focus { border-color: var(--green); }
  .send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--green); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s, transform 0.1s; }
  .send-btn:hover { background: var(--green-dark); }
  .send-btn:active { transform: scale(0.94); }
  .send-btn svg { fill: #fff; }

  .powered { text-align: center; font-size: 11px; color: var(--text-muted); padding: 0 0 8px; opacity: 0.5; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-top">
      <div class="header-icon">🏠</div>
      <div>
        <div class="header-title">Little Ursula</div>
        <div class="header-sub"><span class="online-dot"></span> Chichi's AI Assistant</div>
      </div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="msg-av">🏠</div>
      <div class="bubble">Hi! Welcome to <strong>Little Ursula</strong> 🎉<br><br>I'm Chichi's AI assistant. Feel free to ask me anything about the room — boiler, washing machine, TV, trash disposal, and more.<br><br>How can I help you today?</div>
    </div>
  </div>

  <div class="quick">
    <button class="qbtn" onclick="askQ('How do I adjust the room temperature?')">🌡️ Boiler</button>
    <button class="qbtn" onclick="askQ('How do I use the washing machine?')">👕 Washing</button>
    <button class="qbtn" onclick="askQ('How do I use the TV?')">📺 TV</button>
    <button class="qbtn" onclick="askQ('How do I sort and dispose of trash?')">♻️ Trash</button>
    <button class="qbtn" onclick="askQ('What should I do if something is broken?')">⚠️ Damage</button>
    <button class="qbtn" onclick="askQ('Tell me about bathroom rules.')">🚿 Bathroom</button>
    <button class="qbtn" onclick="askQ('How do I use the gas stove?')">🍳 Gas stove</button>
    <button class="qbtn" onclick="askQ('Where can I store my luggage?')">🛏 Storage</button>
  </div>

  <div class="input-area">
    <input id="txt" type="text" placeholder="Ask anything about the room…" onkeydown="if(event.key==='Enter')send()" />
    <button class="send-btn" onclick="send()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="powered">Powered by Gemini AI</div>
</div>

<script>
const SYSTEM = `You are a friendly AI assistant for "Little Ursula", a short-term rental in Seoul managed by Chichi.
Answer only based on the manual below. Be concise, warm, and helpful. Use simple English. Add line breaks for readability.
If a question is not covered in the manual, say: "For this, please contact Chichi directly 😊"

=== MANUAL ===

BOILER:
- Default room temperature: 17°C. Adjust by turning the dial to your desired level.
- Do NOT touch the lever on the right side of the boiler.
- For additional settings, contact Chichi first.
- Hot water is available without adjusting the boiler separately.
- For hotter water: raise the black lever on the left by one notch, then briefly turn on the tap.
- When going out: turn the boiler dial all the way to the left.

AIR CONDITIONER:
- Difficult to use in winter. Will be cleaned and ready before June.
- A photo guide with English translations will be provided.

TV:
- You can watch terrestrial TV channels, YouTube, and Netflix.
- For YouTube/Netflix: log in with your own personal account.
- To watch terrestrial TV: select "HDMI3" under External Input.
- USB: connect to ports on the back or bottom of the monitor.
- To rotate monitor vertically: (1) turn orange button on back counterclockwise, (2) rotate monitor to vertical, (3) turn orange button clockwise to secure.

WASHING MACHINE:
- Select your settings, close the door properly, press the fast-forward (⏩) button to start.
- Complimentary capsule detergent is provided under the sink cabinet (first stay only).
- Fabric softener: prepare your own. Recommended: Downy White Musk.
- Capsule/solid detergent: put directly in drum. Half load = 1, fuller load = 2.
- Liquid detergent: fabric softener in yellow slot, detergent in red slot. Half load = half paper cup, fuller load = two-thirds of a paper cup.
- Accidentally washed banknotes/paper: place towel under lower-right of machine → open cover → turn drain cap counterclockwise (water may spill) → remove items → close drain cap clockwise → wipe up water. If carpet gets wet, contact Chichi.
- If washing machine makes a warning sound: contact Chichi.
- Drying rack: stored under the bed frame in front of the bathroom door.

GAS STOVE:
- To use: turn lever so arrow points right (→). Right burner ignites easier if turned slowly.
- When not in use: turn lever so arrow points downward (↓).
- When cooking with strong odors or smoke: turn on ventilation fan or open windows.
- Microwave: only use microwave-safe containers. No uncoated paper, plastic wrap, aluminum foil, or stainless steel.
- In case of fire: soak a towel/blanket in water and cover the fire. Use fire extinguisher at stairway corner. If hard to control, evacuate shouting "Fire!" and call 119.

BATHROOM:
- Always close the shower curtain before showering. Without it, the door may swell and not close.
- If mold appears on shower curtain or blinds: contact Chichi — we'll replace them.
- When opening windows for ventilation: use blinds for privacy.
- Glass shelf in front of mirror: for cosmetics/small toiletries only. No heavy items.
- Cabinet above toilet: store toilet paper and sanitary supplies. Complimentary supplies provided — buy your own when used up.
- Cleaning tools (brush, spray) are next to the toilet.
- Shower and sink filters are replaced regularly.

HAIR STRAIGHTENER / HAIR DRYER:
- Located on the bathroom shelf. Plug into the outlet on the right wall next to the mirror.
- Be careful of burns, electric shock, and fire.
- When not in use: always turn off and unplug.
- Keep away from water. If wet, dry before use.

STORAGE:
- Lift the bed skirt to access storage space for suitcases and boxes.

DINING TABLE LIGHT / VACUUM CLEANER:
- Both are USB rechargeable wireless devices.
- When not in use: charge using the charger on the shelf near the entrance. Charger is stored next to the TV.
- To empty vacuum filter: (1-2) twist and pull the opaque vacuum tube — transparent part detaches. (3-4) Turn handle body and transparent part to the right to remove. (5-6) Remove top filter, shake out debris.

TRASH & RECYCLING:
- Trash bags (10L), food waste bags (3L), and multi-purpose bags are provided above the microwave.
- You are responsible for taking out trash during your stay. Take it out little by little when going out — place at the designated disposal area in front of the building entrance.
- Cleaning is NOT provided unless you check out.
- Do not leave trash too long — can attract insects and cause odors. Complaints may result in eviction.
- Recycling: sort plastic, glass, cans, and paper separately.
- Regular trash: use 10L volume-based trash bags. Place at building recycling area after 6 PM on Wednesday.
- Food waste: pour liquids down the sink. Collect food scraps from sink strainer into yellow food waste bag (3L). If bag is not full, tie securely and store in the freezer.
- When bags run out: buy 10L volume-based trash bags and 3L food waste bags at a convenience store.

DAMAGED OR LOST ITEMS:
- If anything is damaged or broken: contact Chichi immediately.
- Do NOT check out without reporting — may affect your security deposit refund.
- Security deposit: 330,000 KRW.
- Items to be careful about: air conditioner, refrigerator, microwave, gas stove, coffee pot, vacuum cleaner, lint roller, Smart TV, washing machine, drying rack, showerhead, faucet, dining table light.
- Report damage via 1:1 chat on the Enkorstay platform, then share the exact damage amount or repair cost with the platform.`;

const history = [];

function askQ(q) {
  document.getElementById('txt').value = q;
  send();
}

async function send() {
  const input = document.getElementById('txt');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  addMsg('user', text);
  history.push({ role: 'user', content: text });

  const typingEl = addTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, system: SYSTEM })
    });
    const data = await res.json();
    typingEl.remove();
    const reply = data.text || 'Sorry, something went wrong. Please try again.';
    addMsg('bot', reply);
    history.push({ role: 'assistant', content: reply });
  } catch(e) {
    typingEl.remove();
    addMsg('bot', 'Connection error. Please try again 🙏');
  }
}

function addMsg(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'msg-av';
  av.textContent = role === 'bot' ? '🏠' : '🙋';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  if (role === 'bot') { div.appendChild(av); div.appendChild(bubble); }
  else { div.appendChild(bubble); div.appendChild(av); }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="msg-av">🏠</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}
</script>
</body>
</html>
